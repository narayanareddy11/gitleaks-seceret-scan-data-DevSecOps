apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins
  namespace: jenkins
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: jenkins-kubernetes-agent-manager
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "pods/exec", "services", "events", "secrets", "configmaps", "persistentvolumeclaims"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jenkins-kubernetes-agent-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: jenkins-kubernetes-agent-manager
subjects:
- kind: ServiceAccount
  name: jenkins
  namespace: jenkins
